<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RackEmUp</title>
    <link rel="stylesheet" href="formatting.css">
    <style>
        .jump-container {
            margin-top: 30px;
            padding: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }
        select {
            padding: 8px;
            border-radius: 5px;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <h1>Welcome to Rackemup</h1>
    <p>Click the start button to begin your quiz journey</p>
    
    <a href="quiz.html" class="start-btn" onclick="localStorage.setItem('quizScore', 0)">Start Quiz</a>

    <div class="jump-container">
        <p>Or jump to a specific question:</p>
        <select id="questionSelect">
            <option value="quiz.html">Question 1</option>
            <option value="quiz2.html">Question 2</option>
            <option value="quiz3.html">Question 3</option>
            <option value="quiz4.html">Question 4</option>
        </select>
        <button class="btn btn-blue" style="width: auto; padding: 10px 20px;" onclick="jumpToQuestion()">Go</button>
    </div>

    <script>
        function jumpToQuestion() {
            localStorage.setItem('quizScore', 0);
            
            const destination = document.getElementById('questionSelect').value;
            
            window.location.href = destination;
        }
    </script>
</body>
</html>
