<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RackEmUp</title>
    <link rel="stylesheet" href="formatting.css">
</head>
<body>
    <h1>Welcome to Rackemup</h1>
    <p>Click the start button to begin your quiz journey</p>
    <a href="quiz.html" class="start-btn" onclick="localStorage.setItem('quizScore', 0)">Start</a>
    <div class="settings" style="margin: 10px;">
        <label>
            <input type="checkbox" id="tts-toggle" onclick="toggleNarration()"> 
            Enable Text-to-speech?
        </label>
    </div>

    <script>
        document.getElementById('tts-toggle').checked = localStorage.getItem("narrationEnabled") === "true";
    </script>
    <div id="cookie-banner" class="cookie-container" style="display: none;">
        <p>This webpage uses local data to save your quiz score and settings. Is that cool?</p>
        <button onclick="acceptData()">Accept</button>
        <button onclick="declineData()">Decline</button>
    </div>
</body>
</html>
